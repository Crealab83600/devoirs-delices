<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avis | Devoirs & Délices</title>
</head>
<body style="font-family:'Poppins',sans-serif;background: linear-gradient(135deg,#e0f7fa,#80deea);margin:0;">

<!-- MENU FIXE -->
<nav style="position:fixed;top:0;width:100%;background:linear-gradient(135deg,#0077b6,#00b4d8);padding:15px 0;display:flex;justify-content:center;gap:25px;z-index:1000;">
  <a href="index.html" style="color:white;font-weight:600;">Accueil</a>
  <a href="about.html" style="color:white;font-weight:600;">À propos</a>
  <a href="packs.html" style="color:white;font-weight:600;">Offres</a>
  <a href="contact.html" style="color:white;font-weight:600;">Contact</a>
  <a href="avis.html" style="color:white;font-weight:600;">Avis</a>
</nav>

<!-- HEADER -->
<header style="margin-top:60px;text-align:center;padding:120px 20px;background: url('images/header-bg-avis.jpg') no-repeat center/cover;color:white;animation: popHeader 1.5s infinite alternate;">
  <h1>Avis des parents</h1>
  <p>Laissez votre avis sur les séances Devoirs & Délices</p>
</header>

<div style="max-width:1100px;margin:auto;margin-top:50px;padding:30px;background:rgba(255,255,255,0.85);backdrop-filter:blur(6px);border-radius:15px;">

  <h2>Ajouter un avis</h2>
  <form id="reviewForm" style="display:flex;flex-direction:column;gap:15px;">
    <input type="text" id="parentName" placeholder="Nom du parent" required style="padding:10px;border-radius:8px;border:1px solid #ccc;">
    <input type="text" id="childName" placeholder="Nom de l'élève" required style="padding:10px;border-radius:8px;border:1px solid #ccc;">
    <textarea id="reviewText" rows="4" placeholder="Votre avis..." required style="padding:10px;border-radius:8px;border:1px solid #ccc;"></textarea>
    <button type="submit" style="padding:12px 20px;background:#0077b6;color:white;border:none;border-radius:8px;cursor:pointer;transition:0.3s;" onmouseover="this.style.background='#005f87';" onmouseout="this.style.background='#0077b6';">Envoyer l'avis</button>
  </form>

  <div id="reviewsContainer" style="margin-top:30px;"></div>
</div>

<footer style="text-align:center;padding:30px;background:#0077b6;color:white;margin-top:50px;">
📍 Fréjus • 📧 raphaelmaury83600@gmail.com<br>
© 2026 Devoirs & Délices
</footer>

<script>
// Animation pop header
const header = document.querySelector('header');
let scale=1, dir=0.002;
setInterval(()=>{
  scale+=dir;
  if(scale>1.02 || scale<0.98) dir*=-1;
  header.style.transform=`scale(${scale})`;
},20);

// Avis dynamique
const reviewForm = document.getElementById("reviewForm");
const reviewsContainer = document.getElementById("reviewsContainer");
reviewForm.addEventListener('submit',(e)=>{
  e.preventDefault();
  const parent = document.getElementById("parentName").value;
  const child = document.getElementById("childName").value;
  const text = document.getElementById("reviewText").value;

  const reviewDiv = document.createElement('div');
  reviewDiv.style.background='white';
  reviewDiv.style.padding='15px';
  reviewDiv.style.marginBottom='15px';
  reviewDiv.style.borderRadius='12px';
  reviewDiv.style.boxShadow='0 5px 20px rgba(0,0,0,0.08)';
  reviewDiv.innerHTML = `<strong>${parent} (parent de ${child})</strong><p>${text}</p>`;
  reviewsContainer.prepend(reviewDiv);

  reviewForm.reset();
  alert("Merci pour votre avis !");
});
</script>

</body>
</html>
