  position:fixed; top:0; width:100%; background:rgba(0,119,182,0.9);

header h1{font-size:50px; margin:0; animation:slideIn 1s ease-in-out;}
header p{font-size:22px; margin-top:10px; animation:fadeIn 2s;}

@keyframes slideIn{0%{transform:translateY(-50px);opacity:0;}100%{transform:translateY(0);opacity:1;}}

  transition:0.3s;
}
form:hover{transform:scale(1.02);}
input, textarea{
  padding:12px; border-radius:12px; border:1px solid #ccc; font-size:16px; width:100%;
}

  padding:15px; border:none; border-radius:12px; background:#0077b6; color:white;
  font-weight:bold; cursor:pointer; transition:0.3s;

.map{

<header>
<h1>Contactez-nous</h1>
<p>Pour toute question ou information sur nos ateliers à Fréjus</p>
</header>

<section>
<h2>Formulaire de contact</h2>
<form onsubmit="sendMail(event)">
<input type="text" id="name" placeholder="Nom parent" required>
<input type="email" id="email" placeholder="Email" required>
<textarea id="message" placeholder="Votre message..." rows="5" required></textarea>
<button type="submit">Envoyer</button>
</form>

<h2>Localisation</h2>
<div class="map">
<iframe src="https://www.google.com/maps?q=Fréjus&output=embed" style="width:100%; height:100%; border:0;"></iframe>
</div>
</section>

<footer style="text-align:center;padding:30px;background:rgba(0,119,182,0.9);color:white;margin-top:50px;">
📍 Fréjus • 📧 raphaelmaury83600@gmail.com
<br><br>
© 2026 Devoirs & Délices
</footer>

<script>
function sendMail(e){
  e.preventDefault();
  const name=document.getElementById('name').value;
  const email=document.getElementById('email').value;
  const message=document.getElementById('message').value;
  const subject="Contact Devoirs & Délices";
  const body=`Nom: ${name}%0D%0AEmail: ${email}%0D%0AMessage: ${message}`;
  window.location.href=`mailto:raphaelmaury83600@gmail.com?subject=${subject}&body=${body}`;
  alert("Merci ! Votre message a été préparé pour envoi par mail.");
}
</script>

</body>
