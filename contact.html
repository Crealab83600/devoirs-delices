<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Devoirs & Délices</title>
</head>
<body style="font-family:'Poppins',sans-serif;background: linear-gradient(135deg,#e0f7fa,#80deea);margin:0;">

<!-- MENU FIXE -->
<nav style="position:fixed;top:0;width:100%;background:linear-gradient(135deg,#0077b6,#00b4d8);padding:15px 0;display:flex;justify-content:center;gap:25px;z-index:1000;">
  <a href="index.html" style="color:white;font-weight:600;">Accueil</a>
  <a href="about.html" style="color:white;font-weight:600;">À propos</a>
  <a href="packs.html" style="color:white;font-weight:600;">Offres</a>
  <a href="contact.html" style="color:white;font-weight:600;">Contact</a>
  <a href="avis.html" style="color:white;font-weight:600;">Avis</a>
</nav>

<!-- HEADER -->
<header style="margin-top:60px;text-align:center;padding:120px 20px;background: url('images/header-bg-contact.jpg') no-repeat center/cover;color:white;animation: glowHeader 2s infinite alternate;">
  <h1>Contactez-moi</h1>
  <p>Envoyez un mail pour réserver ou poser vos questions</p>
</header>

<!-- FORMULAIRE -->
<div style="max-width:1100px;margin:auto;margin-top:50px;padding:30px;background:rgba(255,255,255,0.85);backdrop-filter:blur(6px);border-radius:15px;">

  <h2>Formulaire de contact</h2>
  <form action="mailto:raphaelmaury83600@gmail.com" method="post" enctype="text/plain" style="display:flex;flex-direction:column;gap:15px;">
    <input type="text" name="Nom" placeholder="Nom complet" required style="padding:10px;border-radius:8px;border:1px solid #ccc;">
    <input type="email" name="Email" placeholder="Email" required style="padding:10px;border-radius:8px;border:1px solid #ccc;">
    <textarea name="Message" rows="4" placeholder="Votre message" required style="padding:10px;border-radius:8px;border:1px solid #ccc;"></textarea>
    <button type="submit" style="padding:12px 20px;background:#0077b6;color:white;border:none;border-radius:8px;cursor:pointer;transition:0.3s;" onmouseover="this.style.background='#005f87';" onmouseout="this.style.background='#0077b6';">Envoyer</button>
  </form>

  <h2 style="margin-top:50px;">📍 Localisation</h2>
  <iframe src="https://www.google.com/maps?q=Fréjus&output=embed" style="width:100%;height:350px;border-radius:12px;border:none;"></iframe>
</div>

<footer style="text-align:center;padding:30px;background:#0077b6;color:white;margin-top:50px;">
📍 Fréjus • 📧 raphaelmaury83600@gmail.com<br>
© 2026 Devoirs & Délices
</footer>

<!-- Animation header glow -->
<script>
const header = document.querySelector('header');
let opacity = 0.8, dir = 0.005;
setInterval(()=>{
  opacity += dir;
  if(opacity>1 || opacity<0.8) dir*=-1;
  header.style.filter = `brightness(${opacity})`;
},30);
</script>

</body>
</html>
