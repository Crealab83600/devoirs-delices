<style>
/* ===== BODY ===== */
body {
  margin:0;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#e0f7fa,#f0f8ff);
  color:#333;
}

/* ===== NAVBAR ===== */
nav {
  position:fixed;
  top:0;
  width:100%;
  background:rgba(0,119,182,0.95);
  padding:15px;
  display:flex;
  justify-content:center;
  gap:25px;
  z-index:1000;
  box-shadow:0 2px 15px rgba(0,0,0,0.3);
}
nav a {
  color:white;
  font-weight:bold;
  text-decoration:none;
  transition:0.3s;
}
nav a:hover {
  color:#ffeb3b;
  transform:scale(1.1);
}

/* ===== HEADER ===== */
header {
  margin-top:60px;
  height:450px;
  color:white;
  text-align:center;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:linear-gradient(rgba(0,0,0,0.3),rgba(0,0,0,0.3)),
    url('https://images.unsplash.com/photo-1581092795362-d9d3f436fb7b?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&q=80&w=1920') center/cover no-repeat;
}
header h1 {font-size:50px;margin:0;animation:slideIn 1s ease-in-out;}
header p {font-size:22px;margin-top:15px;animation:fadeIn 2s;}
@keyframes slideIn{0%{transform:translateY(-50px);opacity:0;}100%{transform:translateY(0);opacity:1;}}
@keyframes fadeIn{0%{opacity:0;}100%{opacity:1;}}

/* ===== SECTIONS ===== */
section {padding:60px 20px; max-width:1200px;margin:auto;}
h2 {text-align:center;font-size:36px;margin-bottom:40px;color:#0077b6;}

/* ===== FORM ===== */
form {
  display:flex;
  flex-direction:column;
  gap:20px;
  background:rgba(255,255,255,0.9);
  padding:40px;
  border-radius:20px;
  max-width:600px;
  margin:auto;
  box-shadow:0 15px 40px rgba(0,0,0,0.25);
  transition:0.3s;
}
form:hover {transform:translateY(-5px);box-shadow:0 20px 60px rgba(0,0,0,0.35);}
input, textarea {
  padding:15px;
  border-radius:12px;
  border:1px solid #ccc;
  font-size:16px;
  transition:0.3s;
}
input:focus, textarea:focus {
  border-color:#0077b6;
  box-shadow:0 0 10px rgba(0,119,182,0.4);
  outline:none;
}
button {
  padding:15px;
  background:#ff5722;
  color:white;
  font-weight:bold;
  border:none;
  border-radius:12px;
  cursor:pointer;
  transition:0.3s;
}
button:hover {background:#ff7043; transform:scale(1.05);}

/* ===== MAP ===== */
.map-container {
  margin-top:60px;
  max-width:1200px;
  height:450px;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 15px 40px rgba(0,0,0,0.25);
  transition:0.3s;
}
.map-container:hover {transform:scale(1.02);box-shadow:0 20px 60px rgba(0,0,0,0.35);}

/* ===== FOOTER ===== */
footer {
  text-align:center;
  padding:40px;
  background:rgba(0,119,182,0.95);
  color:white;
  margin-top:50px;
  line-height:1.6;
}
</style>

<header>
<h1>Contactez-nous</h1>
<p>Pour réserver ou poser vos questions à Devoirs & Délices</p>
</header>

<section>
<h2>Envoyer un message</h2>
<form onsubmit="sendMail(event)">
<input type="text" id="name" placeholder="Nom de l'enfant" required>
<input type="email" id="email" placeholder="Email du parent" required>
<textarea id="message" placeholder="Votre message / question" rows="5" required></textarea>
<button type="submit">Envoyer</button>
</form>
</section>

<section>
<h2>Nous trouver à Fréjus</h2>
<div class="map-container">
<iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2894.6790743536033!2d6.748200615500196!3d43.42882037913279!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x12c9aa3c3a75a2c1%3A0xb865c4cce5b38b5c!2sFr%C3%A9jus%2C%20France!5e0!3m2!1sfr!2sus!4v1709540275941!5m2!1sfr!2sus" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
</div>
</section>

<script>
function sendMail(event){
  event.preventDefault();
  const name = document.getElementById('name').value;
  const email = document.getElementById('email').value;
  const message = document.getElementById('message').value;
  const subject = 'Demande Devoirs & Délices';
  const body = `Nom: ${name}%0D%0AEmail: ${email}%0D%0AMessage: ${message}`;
  window.location.href = `mailto:raphaelmaury83600@gmail.com?subject=${subject}&body=${body}`;
  alert("Votre message a été préparé dans votre application mail.");
}
</script>
