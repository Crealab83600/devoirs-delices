<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Devoirs & Délices | Contact</title>
<style>
body{margin:0;font-family:Poppins,Arial,sans-serif;background:linear-gradient(135deg,#e0f7fa,#80deea);}
nav{position:fixed;top:0;width:100%;background:#0077b6;padding:15px;display:flex;justify-content:center;gap:25px;z-index:1000;box-shadow:0 2px 15px rgba(0,0,0,0.2);}
nav a{color:white;font-weight:bold;transition:0.3s;}
nav a:hover{color:#ffeb3b;}
header{margin-top:60px;height:300px;background:url('https://images.unsplash.com/photo-1581090700227-7e9ec0c89b6c') center/cover;color:white;text-align:center;padding-top:120px;position:relative;}
header::after{content:"";position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.3);}
header h1{font-size:45px;animation:slideIn 1s ease-in-out;position:relative;z-index:1;}
header p{font-size:20px;margin-top:10px;animation:fadeIn 2s;position:relative;z-index:1;}
section{padding:60px 20px;max-width:1200px;margin:auto;}
h2{font-size:36px;margin-bottom:20px;text-align:center;}
form{display:grid;gap:15px;max-width:600px;margin:auto;background:rgba(255,255,255,0.9);padding:30px;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,0.1);}
input, textarea{padding:12px;border-radius:10px;border:1px solid #ccc;font-size:16px;width:100%;}
button{padding:15px;background:#0077b6;color:white;font-weight:bold;border:none;border-radius:10px;cursor:pointer;transition:0.3s;}
button:hover{background:#00b4d8;}
.map-container{margin-top:50px;border-radius:20px;overflow:hidden;box-shadow:0 10px 25px rgba(0,0,0,0.2);}
iframe{width:100%;height:400px;border:0;}
footer{background:#0077b6;color:white;text-align:center;padding:30px;margin-top:50px;}
.success-popup{position:fixed;top:20px;right:20px;background:#00b4d8;color:white;padding:15px 20px;border-radius:12px;box-shadow:0 5px 15px rgba(0,0,0,0.2);display:none;z-index:2000;animation:fadeInPopup 0.5s;}
@keyframes slideIn{0%{transform:translateY(-50px);opacity:0;}100%{transform:translateY(0);opacity:1;}}
@keyframes fadeIn{0%{opacity:0;}100%{opacity:1;}}
@keyframes fadeInPopup{0%{opacity:0;transform:translateY(-20px);}100%{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>

<!-- MENU -->
<nav>
<a href="index.html">Accueil</a>
<a href="about.html">À propos</a>
<a href="packs.html">Offres</a>
<a href="contact.html">Contact</a>
<a href="avis.html">Avis</a>
</nav>

<!-- HEADER -->
<header>
<h1>Contactez-moi</h1>
<p>Une question ? Une demande de séance ? Envoyez-moi un message !</p>
</header>

<!-- FORMULAIRE -->
<section>
<h2>Formulaire de contact</h2>
<form id="contactForm" onsubmit="sendMail(event)">
<input type="text" id="name" placeholder="Nom de l'élève" required>
<input type="email" id="email" placeholder="Email du parent" required>
<textarea id="message" rows="5" placeholder="Votre message" required></textarea>
<button type="submit">Envoyer</button>
</form>
<div class="success-popup" id="successPopup">Message envoyé avec succès !</div>
</section>

<!-- GOOGLE MAPS -->
<section>
<h2>Où se situe Devoirs & Délices</h2>
<div class="map-container">
<iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2894.565476045882!2d6.7397!3d43.4327!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x12cd0c057e2646df%3A0xe49ad7c6c49b8fbb!2sFr%C3%A9jus%2C%20France!5e0!3m2!1sfr!2sus!4v1670000000000!5m2!1sfr!2sus" allowfullscreen="" loading="lazy"></iframe>
</div>
</section>

<!-- FOOTER -->
<footer>
📍 Fréjus • 📧 raphaelmaury83600@gmail.com
<br><br>
© 2026 Devoirs & Délices
</footer>

<!-- JS -->
<script>
function sendMail(e){
e.preventDefault();
const name=document.getElementById('name').value;
const email=document.getElementById('email').value;
const message=document.getElementById('message').value;
window.location.href=`mailto:raphaelmaury83600@gmail.com?subject=Contact%20Devoirs&body=Nom:%20${name}%0D%0AEmail:%20${email}%0D%0AMessage:%20${message}`;
document.getElementById('successPopup').style.display='block';
setTimeout(()=>{document.getElementById('successPopup').style.display='none';},3000);
document.getElementById('contactForm').reset();
}
</script>

</body>
</html>
